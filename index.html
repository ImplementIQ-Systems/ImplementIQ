<section class="faq-section">

                <div class="faq-answer"
                     data-pt="Depende da complexidade e do âmbito. Após a conversa inicial, apresentamos uma proposta com investimento claro e faseamento definido. Trabalhamos com projetos de diferentes dimensões, desde automações pontuais até implementações mais abrangentes."
                     data-en="It depends on complexity and scope. After the initial conversation, we present a proposal with clear investment and defined phases. We work with projects of different sizes, from specific automations to more comprehensive implementations."></div>
            </div>

            <div class="faq-item animate-on-scroll">
                <button class="faq-question" aria-expanded="false">
                    <span data-pt="Trabalham apenas na zona de Lisboa?"
                          data-en="Do you only work in the Lisbon area?"></span>
                    <span class="faq-toggle">+</span>
                </button>
                <div class="faq-answer"
                     data-pt="Não. Trabalhamos remotamente com empresas em todo o país. Reuniões por videochamada, implementação à distância e comunicação direta via WhatsApp ou email. Na zona de Lisboa e Setúbal, reuniões presenciais são uma opção."
                     data-en="No. We work remotely with companies across the country. Video meetings, remote implementation and direct communication via WhatsApp or email. In the Lisbon and Setúbal area, in-person meetings are an option."></div>
            </div>

            <div class="faq-item animate-on-scroll">
                <button class="faq-question" aria-expanded="false">
                    <span data-pt="Quanto tempo demora uma implementação?"
                          data-en="How long does an implementation take?"></span>
                    <span class="faq-toggle">+</span>
                </button>
                <div class="faq-answer"
                     data-pt="Depende da complexidade. Automações pontuais: 2 a 4 semanas. Implementações de BI: 3 a 6 semanas. Projetos mais abrangentes: 6 a 12 semanas. Sempre com entregas faseadas e cronograma definido à partida."
                     data-en="It depends on complexity. Specific automations: 2 to 4 weeks. BI implementations: 3 to 6 weeks. More comprehensive projects: 6 to 12 weeks. Always with phased deliveries and timeline set upfront."></div>
            </div>

            <div class="faq-item animate-on-scroll">
                <button class="faq-question" aria-expanded="false">
                    <span data-pt="Precisamos de ter conhecimento técnico interno?"
                          data-en="Do we need internal technical knowledge?"></span>
                    <span class="faq-toggle">+</span>
                </button>
                <div class="faq-answer"
                     data-pt="Não. Entregamos sistemas prontos a usar e formamos a equipa para uma utilização eficiente. O nosso objetivo é que tudo seja intuitivo — sem necessidade de entender código ou infraestrutura."
                     data-en="No. We deliver ready-to-use systems and train your team for efficient use. Our goal is for everything to be intuitive — no need to understand code or infrastructure."></div>
            </div>

            <div class="faq-item animate-on-scroll">
                <button class="faq-question" aria-expanded="false">
                    <span data-pt="Trabalham com os sistemas que já temos?"
                          data-en="Do you work with systems we already have?"></span>
                    <span class="faq-toggle">+</span>
                </button>
                <div class="faq-answer"
                     data-pt="Sim. A maioria das implementações envolve integração com ferramentas existentes. O objetivo é fazer os sistemas comunicarem entre si e potenciar o que já funciona, sem substituir tudo desnecessariamente."
                     data-en="Yes. Most implementations involve integration with existing tools. The goal is to make systems communicate with each other and enhance what already works, without replacing everything unnecessarily."></div>
            </div>

            <div class="faq-item animate-on-scroll">
                <button class="faq-question" aria-expanded="false">
                    <span data-pt="A nossa empresa não será pequena de mais para isto?"
                          data-en="Isn't our company too small for this?"></span>
